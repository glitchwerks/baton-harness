name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main, "feature/**"]

# Three independent jobs run in parallel so a failure in one still runs
# and reports the others — each surfaces its own named check in the PR UI.

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Lint (ruff check)
        run: .venv/bin/python -m ruff check .

      - name: Format check (ruff format)
        run: .venv/bin/python -m ruff format --check .

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Type check (mypy)
        run: .venv/bin/python -m mypy src

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Test (pytest)
        run: .venv/bin/python -m pytest
